# 取代 ${ADMIN_HOST} / ${API_HOST} 為你的網域。範例：
#   admin.gov.taipei  → 後台
#   api.gov.taipei    → API
#
# Let's Encrypt 簽發前先用第一個 server block（HTTP-01 challenge）。
# 簽發成功後再啟用第二、第三個 server block。

# ---------- HTTP（80）：ACME challenge + 強制升級 HTTPS ----------
server {
    listen 80;
    listen [::]:80;
    server_name _;

    # API 路由
    location /api/ {
        proxy_pass http://api:4000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 後台路由 (Admin) - 注意結尾的斜線
    location /admin/ {
        proxy_pass http://admin:3001/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 前台路由 (Web)
    location / {
        proxy_pass http://web:3002/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

