# Production compose for single-VM deployment (e.g. GCP Compute Engine).
#
# Usage:
#   1. Copy .env.production.example to .env and fill in real secrets.
#   2. Point your DNS A-record to the VM's external IP.
#   3. Issue TLS certs (see deploy/README.md for the certbot flow).
#   4. docker compose -f docker-compose.prod.yml --env-file .env up -d
#
# Volumes are persisted on the host. Only nginx exposes ports to the public
# internet; everything else is reachable only on the internal compose network.

name: gov-platform

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER:     ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB:       ${POSTGRES_DB}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    # No port mapping — only reachable via the internal network.
    networks: [backend]

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --appendonly
      - 'yes'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', '-a', '${REDIS_PASSWORD}', 'ping']
      interval: 10s
      timeout: 3s
      retries: 5
    networks: [backend]

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER:     ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-fsS', 'http://localhost:9000/minio/health/live']
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks: [backend]

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    image: asia-east1-docker.pkg.dev/doit-digiiinova-website/gov-platform/api:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: ${MINIO_ROOT_USER}
      S3_SECRET_KEY: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET: ${S3_BUCKET}
      S3_REGION: ${S3_REGION:-us-east-1}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS}
      # Web frontend ISR webhook — when a page is published, API POSTs here
      WEB_REVALIDATE_URL: http://web:3002/api/revalidate
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
    depends_on:
      postgres: { condition: service_healthy }
      redis:    { condition: service_healthy }
      minio:    { condition: service_started }
    networks: [backend]

  admin:
    build:
      context: .
      dockerfile: packages/admin/Dockerfile
      args:
        # Baked into the bundle at build time — must match the public URL.
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}
    image: asia-east1-docker.pkg.dev/doit-digiiinova-website/gov-platform/admin:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
    depends_on:
      api: { condition: service_started }
    networks: [backend]

  web:
    build:
      context: .
      dockerfile: packages/web/Dockerfile
      args:
        # Public URL clients use to reach the API (same constraint as admin).
        NEXT_PUBLIC_API_URL: ${PUBLIC_API_URL}
        # Server-side fetch path inside the compose network.
        API_BASE_URL: http://api:4000/api/v1
    image: asia-east1-docker.pkg.dev/doit-digiiinova-website/gov-platform/web:latest
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3002
      # Server-side ISR fetch goes over the internal network, not the public URL.
      API_BASE_URL: http://api:4000/api/v1
      REVALIDATE_SECRET: ${REVALIDATE_SECRET}
    depends_on:
      api: { condition: service_started }
    networks: [backend]

  # Public entrypoint. Terminates TLS and reverse-proxies to api / admin.
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/certbot/conf:/etc/letsencrypt:ro
      - ./deploy/certbot/www:/var/www/certbot:ro
    depends_on:
      - api
      - admin
    networks: [backend]

  # certbot runs once on demand to issue / renew certificates.
  # Run with:  docker compose -f docker-compose.prod.yml run --rm certbot
  certbot:
    image: certbot/certbot:latest
    profiles: [tools]
    volumes:
      - ./deploy/certbot/conf:/etc/letsencrypt
      - ./deploy/certbot/www:/var/www/certbot

volumes:
  pg_data:
  redis_data:
  minio_data:

networks:
  backend:
    driver: bridge
